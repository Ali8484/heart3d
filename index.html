<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عرض القلب البشري 3D - نموذج واقعي</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #dc3545;
            --accent-color: #6610f2;
            --dark-bg: #0a0a1a;
            --card-bg: #111122;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a0a1a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* ====== CANVAS FULLSCREEN ====== */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #three-canvas:active { cursor: grabbing; }

        /* ====== UI OVERLAY ====== */
        .ui-layer {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        /* Top Bar */
        .top-bar {
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255,107,107,0.5);
        }

        .brand i { margin-left: 8px; }

        .info-badge {
            background: rgba(220,53,69,0.2);
            border: 1px solid rgba(220,53,69,0.4);
            color: #ff6b6b;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }

        /* Bottom Controls Panel */
        .controls-panel {
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Rotation Sliders */
        .rotation-controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: auto;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .slider-group label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slider-group input[type="range"] {
            width: 120px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: #ff6b6b;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,107,107,0.5);
        }

        .slider-group input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px;
            background: #ff6b6b;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-action {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover {
            background: rgba(220,53,69,0.3);
            border-color: rgba(220,53,69,0.5);
            transform: translateY(-2px);
        }

        .btn-action.active {
            background: rgba(220,53,69,0.4);
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255,107,107,0.3);
        }

        /* Touch Controls (Mobile) */
        .touch-pad {
            position: fixed;
            bottom: 200px;
            right: 20px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: auto;
            touch-action: none;
        }

        .touch-knob {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,107,107,0.6);
            box-shadow: 0 0 20px rgba(255,107,107,0.4);
            position: absolute;
            transition: none;
        }

        .touch-pad-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        /* Loading */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s;
        }

        .loading-screen.hidden { opacity: 0; pointer-events: none; }

        .heart-loader {
            width: 60px; height: 60px;
            position: relative;
            animation: heartbeat 1s ease-in-out infinite;
        }

        .heart-loader::before,
        .heart-loader::after {
            content: '';
            position: absolute;
            width: 30px; height: 48px;
            background: #ff6b6b;
            border-radius: 30px 30px 0 0;
            transform: rotate(-45deg);
            left: 8px;
        }

        .heart-loader::after {
            left: 22px;
            transform: rotate(45deg);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .loading-text {
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .loading-progress {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        /* Pulse indicator */
        .pulse-indicator {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .pulse-bar {
            width: 4px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .pulse-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #dc3545, #ff6b6b);
            border-radius: 2px;
            transition: height 0.1s;
        }

        .pulse-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .brand { font-size: 1rem; }
            .rotation-controls { gap: 10px; }
            .slider-group input[type="range"] { width: 80px; }
            .touch-pad { display: flex; }
            .pulse-indicator { left: 10px; }
            .pulse-bar { height: 60px; }
        }

        @media (max-width: 576px) {
            .controls-panel { padding: 10px; }
            .btn-action { padding: 8px 14px; font-size: 0.8rem; }
            .slider-group input[type="range"] { width: 60px; }
        }

        /* Model info tooltip */
        .model-info {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 0.85rem;
            max-width: 200px;
            z-index: 10;
            display: none;
        }

        .model-info.show { display: block; }

        .model-info h6 {
            color: #ff6b6b;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .model-info p {
            margin-bottom: 4px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="heart-loader"></div>
        <p class="loading-text">جاري تحميل نموذج القلب ثلاثي الأبعاد...</p>
        <p class="loading-progress" id="loadingProgress">0%</p>
    </div>

    <!-- 3D Canvas -->
    <canvas id="three-canvas"></canvas>

    <!-- Top Bar -->
    <div class="ui-layer top-bar">
        <div class="brand">
            <i class="bi bi-heart-pulse-fill"></i>
            القلب البشري 3D
        </div>
        <div class="info-badge">
            <i class="bi bi-hand-index-thumb me-1"></i>
            اسحب للتدوير
        </div>
    </div>

    <!-- Model Info -->
    <div class="model-info" id="modelInfo">
        <h6><i class="bi bi-info-circle me-1"></i> معلومات النموذج</h6>
        <p id="modelName">-</p>
        <p id="modelPolygons">-</p>
        <p id="modelMaterials">-</p>
    </div>

    <!-- Pulse Indicator -->
    <div class="ui-layer pulse-indicator">
        <span class="pulse-label">نبض</span>
        <div class="pulse-bar">
            <div class="pulse-fill" id="pulseFill"></div>
        </div>
    </div>

    <!-- Touch Pad (Mobile) -->
    <div class="touch-pad" id="touchPad">
        <div class="touch-knob" id="touchKnob"></div>
        <span class="touch-pad-label">تحكم باللمس</span>
    </div>

    <!-- Bottom Controls -->
    <div class="ui-layer controls-panel">
        <div class="rotation-controls">
            <div class="slider-group">
                <label><i class="bi bi-arrow-repeat"></i> X</label>
                <input type="range" id="rotX" min="0" max="360" value="0">
            </div>
            <div class="slider-group">
                <label><i class="bi bi-arrow-repeat"></i> Y</label>
                <input type="range" id="rotY" min="0" max="360" value="0">
            </div>
            <div class="slider-group">
                <label><i class="bi bi-arrow-repeat"></i> Z</label>
                <input type="range" id="rotZ" min="0" max="360" value="0">
            </div>
            <div class="slider-group">
                <label><i class="bi bi-zoom-in"></i> تكبير</label>
                <!-- نطاق أوسع للتحكم بالمسافة من الخارج -->
                <input type="range" id="zoomSlider" min="3" max="20" value="10" step="0.1">
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-action" id="btnAutoRotate" onclick="toggleAutoRotate()">
                <i class="bi bi-arrow-clockwise"></i>
                دوران تلقائي
            </button>
            <button class="btn-action" id="btnPulse" onclick="togglePulse()">
                <i class="bi bi-heart-pulse"></i>
                نبض
            </button>
            <button class="btn-action" id="btnWireframe" onclick="toggleWireframe()">
                <i class="bi bi-grid-3x3"></i>
                هيكل سلكي
            </button>
            <button class="btn-action" id="btnExplode" onclick="toggleExplode()">
                <i class="bi bi-box-seam"></i>
                تفكيك
            </button>
            <button class="btn-action" id="btnReset" onclick="resetView()">
                <i class="bi bi-arrow-counterclockwise"></i>
                إعادة
            </button>
        </div>
    </div>

    <!-- Three.js & GLTFLoader -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // ============================================
        // SCENE SETUP
        // ============================================
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        // مسافة ابتدائية أكبر للخروج من القلب
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // Environment for realistic reflections
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // ============================================
        // LIGHTING (Cinematic Studio Setup)
        // ============================================
        const ambientLight = new THREE.AmbientLight(0xffcccc, 0.2);
        scene.add(ambientLight);

        // Key light (warm, from upper right)
        const keyLight = new THREE.DirectionalLight(0xfff0e0, 2.0);
        keyLight.position.set(5, 8, 5);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.bias = -0.001;
        scene.add(keyLight);

        // Fill light (cool, from left)
        const fillLight = new THREE.DirectionalLight(0xccccff, 0.8);
        fillLight.position.set(-5, 3, 3);
        scene.add(fillLight);

        // Rim light (back, for edge definition)
        const rimLight = new THREE.DirectionalLight(0xff6b6b, 1.5);
        rimLight.position.set(0, 5, -8);
        scene.add(rimLight);

        // Bottom bounce light
        const bounceLight = new THREE.DirectionalLight(0x4444aa, 0.3);
        bounceLight.position.set(0, -5, 2);
        scene.add(bounceLight);

        // Point light near the heart for subsurface feel
        const heartLight = new THREE.PointLight(0xff3333, 1.0, 10);
        heartLight.position.set(0, 0, 2);
        scene.add(heartLight);

        // ============================================
        // GROUND / ENVIRONMENT
        // ============================================
        const planeGeometry = new THREE.PlaneGeometry(50, 50);
        const planeMaterial = new THREE.MeshStandardMaterial({
            color: 0x0a0a1a,
            roughness: 0.05,
            metalness: 0.9,
        });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -3;
        plane.receiveShadow = true;
        scene.add(plane);

        // Subtle grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x1a1a3a, 0x0f0f1f);
        gridHelper.position.y = -2.99;
        scene.add(gridHelper);

        // ============================================
        // LOAD 3D HEART MODEL
        // ============================================
        let heartModel = null;
        let originalPositions = new Map();
        let explodeMode = false;

        const loader = new GLTFLoader();
        const loadingProgress = document.getElementById('loadingProgress');

        function loadModel(url) {
            return new Promise((resolve, reject) => {
                loader.load(
                    url,
                    (gltf) => {
                        resolve(gltf);
                    },
                    (xhr) => {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loadingProgress.textContent = percent + '%';
                    },
                    (error) => {
                        reject(error);
                    }
                );
            });
        }

        async function initModel() {
            try {
                // تحميل ملف القلب من مجلد models
                const gltf = await loadModel('./models/heart_3d_2.glb');
                heartModel = gltf.scene;
                setupModel(heartModel);

                // تحديث معلومات النموذج في الواجهة
                document.getElementById('modelName').textContent = 'قلب بشري (GLB)';
                
                // حساب عدد الأوجه
                let totalFaces = 0;
                let totalMaterials = 0;
                const materialsSet = new Set();
                
                heartModel.traverse((child) => {
                    if (child.isMesh) {
                        if (child.geometry && child.geometry.index) {
                            totalFaces += child.geometry.index.count / 3;
                        } else if (child.geometry && child.geometry.attributes.position) {
                            totalFaces += child.geometry.attributes.position.count / 3;
                        }
                        
                        if (child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => materialsSet.add(m.uuid));
                            } else {
                                materialsSet.add(child.material.uuid);
                            }
                        }
                    }
                });
                
                document.getElementById('modelPolygons').textContent = 'الأوجه: ~' + Math.round(totalFaces).toLocaleString();
                document.getElementById('modelMaterials').textContent = 'المواد: ' + materialsSet.size;
                document.getElementById('modelInfo').classList.add('show');

                // إخفاء شاشة التحميل
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                }, 500);

            } catch (error) {
                console.error('خطأ في تحميل النموذج:', error);
                loadingProgress.textContent = 'فشل التحميل!';
                loadingProgress.style.color = '#ff4444';
                
                // عرض رسالة خطأ للمستخدم
                document.querySelector('.loading-text').textContent = 
                    'تعذر تحميل نموذج القلب. تأكد من وجود الملف في: models/heart_3d_.glb';
            }
        }

        function setupModel(model) {
            // تفعيل الظلال لجميع الأجزاء
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    saveOriginalPosition(child);
                    
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(m => {
                                if (m.isMeshStandardMaterial || m.isMeshPhysicalMaterial) {
                                    m.needsUpdate = true;
                                }
                            });
                        } else {
                            if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) {
                                child.material.needsUpdate = true;
                            }
                        }
                    }
                }
            });

            // توسيط النموذج
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            // حجم مناسب يظهر بوضوح من الخارج
            const desiredSize = 0.5;
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = desiredSize / maxDim;
            
            model.scale.setScalar(scale);

            scene.add(model);
        }

        function saveOriginalPosition(mesh) {
            originalPositions.set(mesh.uuid, {
                position: mesh.position.clone(),
                rotation: mesh.rotation.clone()
            });
        }

        // ============================================
        // PARTICLES (Blood cells atmosphere)
        // ============================================
        const particleCount = 300;
        const particleGeo = new THREE.BufferGeometry();
        const pPositions = new Float32Array(particleCount * 3);
        const pColors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            pPositions[i * 3] = (Math.random() - 0.5) * 20;
            pPositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
            pPositions[i * 3 + 2] = (Math.random() - 0.5) * 20;

            const isRed = Math.random() > 0.3;
            pColors[i * 3] = isRed ? 0.8 + Math.random() * 0.2 : 0.2;
            pColors[i * 3 + 1] = isRed ? 0.1 : 0.2;
            pColors[i * 3 + 2] = isRed ? 0.1 : 0.6 + Math.random() * 0.4;
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // ============================================
        // STATE & CONTROLS
        // ============================================
        let autoRotate = false;
        let pulseEnabled = true;
        let wireframeMode = false;
        let targetRotation = { x: 0, y: 0, z: 0 };
        let currentRotation = { x: 0, y: 0, z: 0 };
        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };
        let pulseTime = 0;
        // مسافة ابتدائية 10 (خارج القلب)
        let cameraDistance = 10;

        // Sliders
        const rotX = document.getElementById('rotX');
        const rotY = document.getElementById('rotY');
        const rotZ = document.getElementById('rotZ');
        const zoomSlider = document.getElementById('zoomSlider');

        function updateSliders() {
            rotX.value = ((targetRotation.x * 180 / Math.PI) % 360 + 360) % 360;
            rotY.value = ((targetRotation.y * 180 / Math.PI) % 360 + 360) % 360;
            rotZ.value = ((targetRotation.z * 180 / Math.PI) % 360 + 360) % 360;
        }

        rotX.addEventListener('input', (e) => {
            targetRotation.x = e.target.value * Math.PI / 180;
            autoRotate = false;
            document.getElementById('btnAutoRotate').classList.remove('active');
        });

        rotY.addEventListener('input', (e) => {
            targetRotation.y = e.target.value * Math.PI / 180;
            autoRotate = false;
            document.getElementById('btnAutoRotate').classList.remove('active');
        });

        rotZ.addEventListener('input', (e) => {
            targetRotation.z = e.target.value * Math.PI / 180;
            autoRotate = false;
            document.getElementById('btnAutoRotate').classList.remove('active');
        });

        zoomSlider.addEventListener('input', (e) => {
            cameraDistance = parseFloat(e.target.value);
        });

        // ============================================
        // MOUSE / TOUCH CONTROLS
        // ============================================
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMouse = { x: e.clientX, y: e.clientY };
            canvas.style.cursor = 'grabbing';
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMouse.x;
            const deltaY = e.clientY - previousMouse.y;

            targetRotation.y += deltaX * 0.01;
            targetRotation.x += deltaY * 0.01;

            previousMouse = { x: e.clientX, y: e.clientY };
            updateSliders();
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDragging || e.touches.length !== 1) return;

            const deltaX = e.touches[0].clientX - previousMouse.x;
            const deltaY = e.touches[0].clientY - previousMouse.y;

            targetRotation.y += deltaX * 0.015;
            targetRotation.x += deltaY * 0.015;

            previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            updateSliders();
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Touch Pad (Mobile joystick-style)
        const touchPad = document.getElementById('touchPad');
        const touchKnob = document.getElementById('touchKnob');
        let touchPadActive = false;
        let touchPadCenter = { x: 0, y: 0 };

        touchPad.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchPadActive = true;
            const rect = touchPad.getBoundingClientRect();
            touchPadCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            updateTouchKnob(e.touches[0]);
        }, { passive: false });

        touchPad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!touchPadActive) return;
            updateTouchKnob(e.touches[0]);
        }, { passive: false });

        touchPad.addEventListener('touchend', () => {
            touchPadActive = false;
            touchKnob.style.transform = 'translate(0, 0)';
        });

        function updateTouchKnob(touch) {
            const maxDist = 35;
            let dx = touch.clientX - touchPadCenter.x;
            let dy = touch.clientY - touchPadCenter.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            touchKnob.style.transform = `translate(${dx}px, ${dy}px)`;

            targetRotation.y += dx * 0.005;
            targetRotation.x += dy * 0.005;
            updateSliders();
        }

        // ============================================
        // BUTTON ACTIONS
        // ============================================
        window.toggleAutoRotate = function() {
            autoRotate = !autoRotate;
            document.getElementById('btnAutoRotate').classList.toggle('active');
        };

        window.togglePulse = function() {
            pulseEnabled = !pulseEnabled;
            document.getElementById('btnPulse').classList.toggle('active');
            if (!pulseEnabled && heartModel) {
                heartModel.scale.set(1, 1, 1);
            }
        };

        window.toggleWireframe = function() {
            wireframeMode = !wireframeMode;
            document.getElementById('btnWireframe').classList.toggle('active');

            heartModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.wireframe = wireframeMode);
                    } else {
                        child.material.wireframe = wireframeMode;
                    }
                }
            });
        };

        window.toggleExplode = function() {
            explodeMode = !explodeMode;
            document.getElementById('btnExplode').classList.toggle('active');

            if (!heartModel) return;

            heartModel.traverse((child) => {
                if (child.isMesh && originalPositions.has(child.uuid)) {
                    const original = originalPositions.get(child.uuid);
                    if (explodeMode) {
                        const dir = original.position.clone().normalize();
                        child.position.copy(original.position).add(dir.multiplyScalar(0.8));
                    } else {
                        child.position.copy(original.position);
                    }
                }
            });
        };

        window.resetView = function() {
            targetRotation = { x: 0, y: 0, z: 0 };
            // إعادة تعيين المسافة إلى 10
            cameraDistance = 10;
            zoomSlider.value = 10;
            updateSliders();
            autoRotate = false;
            explodeMode = false;
            document.getElementById('btnAutoRotate').classList.remove('active');
            document.getElementById('btnExplode').classList.remove('active');

            if (heartModel) {
                heartModel.traverse((child) => {
                    if (child.isMesh && originalPositions.has(child.uuid)) {
                        child.position.copy(originalPositions.get(child.uuid).position);
                    }
                });
            }
        };

        // ============================================
        // ANIMATION LOOP
        // ============================================
        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // Smooth rotation interpolation
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.08;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.08;
            currentRotation.z += (targetRotation.z - currentRotation.z) * 0.08;

            if (heartModel) {
                heartModel.rotation.x = currentRotation.x;
                heartModel.rotation.y = currentRotation.y;
                heartModel.rotation.z = currentRotation.z;
            }

            // Auto rotate
            if (autoRotate) {
                targetRotation.y += 0.005;
                updateSliders();
            }

            // Pulse animation
            if (pulseEnabled && heartModel && !explodeMode) {
                pulseTime += 0.04;
                const pulse = 1 + Math.sin(pulseTime) * 0.04;
                heartModel.scale.set(pulse, pulse, pulse);

                // Update pulse bar
                const pulseHeight = 30 + Math.sin(pulseTime) * 30 + 20;
                document.getElementById('pulseFill').style.height = pulseHeight + '%';

                // Light pulse
                heartLight.intensity = 1.0 + Math.sin(pulseTime) * 0.4;
            }

            // تطبيق مسافة الكاميرا بدون قيد إضافي (التحكم كامل)
            const targetZ = cameraDistance;
            camera.position.z += (targetZ - camera.position.z) * 0.1;

            // Floating particles
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3 + 1] += Math.sin(time * 0.5 + i) * 0.001;
                positions[i * 3] += Math.cos(time * 0.3 + i) * 0.0005;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.0005;

            renderer.render(scene, camera);
        }

        // ============================================
        // RESIZE
        // ============================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================
        // INIT
        // ============================================
        initModel();
        animate();

        // Detect mobile
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        if (isMobile()) {
            touchPad.style.display = 'flex';
        }
    </script>
</body>
</html>
