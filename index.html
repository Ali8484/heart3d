<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>القلب البشري 3D - تسميات تفاعلية</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --dark-bg: #0a0a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a0a1a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: grab;
            touch-action: none;
        }
        #three-canvas:active { cursor: grabbing; }

        .ui-layer {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        .top-bar {
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255,107,107,0.5);
        }
        .brand i { margin-left: 8px; }

        .info-badge {
            background: rgba(220,53,69,0.2);
            border: 1px solid rgba(220,53,69,0.4);
            color: #ff6b6b;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }

        .controls-panel {
            bottom: 0; left: 0; right: 0;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-action {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: rgba(220,53,69,0.3);
            border-color: rgba(220,53,69,0.5);
            transform: translateY(-2px);
        }

        .btn-action.active {
            background: rgba(220,53,69,0.4);
            border-color: #ff6b6b;
            box-shadow: 0 0 15px rgba(255,107,107,0.3);
        }

        .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-save {
            background: rgba(39,174,96,0.3) !important;
            border-color: rgba(39,174,96,0.5) !important;
        }

        .btn-save:hover {
            background: rgba(39,174,96,0.5) !important;
        }

        /* ═══════════════════════════════════════════ */
        /* ═══ لافتات التسمية - قابلة للسحب ═══ */
        /* ═══════════════════════════════════════════ */
        .heart-label {
            position: fixed;
            z-index: 20;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .heart-label.visible {
            opacity: 1;
        }

        .heart-label:active {
            cursor: grabbing;
        }

        .heart-label.dragging {
            z-index: 1000;
        }

        .heart-label.locked {
            cursor: default;
            opacity: 0.85;
        }

        .heart-label.locked .label-card {
            border-style: dashed;
        }

        .label-card {
            background: rgba(10, 10, 30, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid;
            border-radius: 10px;
            padding: 8px 14px;
            color: #fff;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
            min-width: 140px;
            text-align: center;
            font-size: 0.9rem;
        }

        .label-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .label-number {
            position: absolute;
            top: -8px;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .label-color-red { border-color: #e74c3c; }
        .label-color-red .label-title { color: #e74c3c; }
        .label-color-red .label-number { background: #e74c3c; right: -8px; }

        .label-color-blue { border-color: #3498db; }
        .label-color-blue .label-title { color: #3498db; }
        .label-color-blue .label-number { background: #3498db; left: -8px; }

        .label-color-darkblue { border-color: #2980b9; }
        .label-color-darkblue .label-title { color: #3498db; }
        .label-color-darkblue .label-number { background: #2980b9; left: -8px; }

        .label-color-gold { border-color: #f1c40f; }
        .label-color-gold .label-title { color: #f1c40f; }
        .label-color-gold .label-number { background: #f39c12; right: -8px; }

        .label-color-orange { border-color: #e67e22; }
        .label-color-orange .label-title { color: #e67e22; }
        .label-color-orange .label-number { background: #d35400; left: -8px; }

        .label-color-purple { border-color: #9b59b6; }
        .label-color-purple .label-title { color: #9b59b6; }
        .label-color-purple .label-number { background: #8e44ad; right: -8px; }

        .label-color-pink { border-color: #e91e63; }
        .label-color-pink .label-title { color: #e91e63; }
        .label-color-pink .label-number { background: #c2185b; left: -8px; }

        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s;
        }

        .loading-screen.hidden { opacity: 0; pointer-events: none; }

        .heart-loader {
            width: 60px; height: 60px;
            position: relative;
            animation: heartbeat 1s ease-in-out infinite;
        }

        .heart-loader::before,
        .heart-loader::after {
            content: '';
            position: absolute;
            width: 30px; height: 48px;
            background: #ff6b6b;
            border-radius: 30px 30px 0 0;
            transform: rotate(-45deg);
            left: 8px;
        }

        .heart-loader::after {
            left: 22px;
            transform: rotate(45deg);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .loading-text {
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
        }

        .loading-progress {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        .save-status {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(39,174,96,0.9);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 700;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            white-space: nowrap;
        }

        .save-status.show { opacity: 1; }

        .pulse-indicator {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .pulse-bar {
            width: 4px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .pulse-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #dc3545, #ff6b6b);
            border-radius: 2px;
            transition: height 0.1s;
        }

        .pulse-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        @media (max-width: 768px) {
            .brand { font-size: 1rem; }
            .btn-action { padding: 6px 12px; font-size: 0.75rem; }
            .label-card { min-width: 110px; padding: 6px 10px; }
            .label-title { font-size: 0.8rem; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="heart-loader"></div>
        <p class="loading-text">جاري تحميل نموذج القلب ثلاثي الأبعاد...</p>
        <p class="loading-progress" id="loadingProgress">0%</p>
    </div>

    <canvas id="three-canvas"></canvas>

    <!-- حاوية اللافتات -->
    <div id="labelsContainer"></div>

    <div class="ui-layer top-bar">
        <div class="brand">
            <i class="bi bi-heart-pulse-fill"></i>
            القلب البشري 3D
        </div>
        <div class="info-badge">
            <i class="bi bi-hand-index-thumb me-1"></i>
            اسحب اللافتات وضعها قرب القلب
        </div>
    </div>

    <div class="save-status" id="saveStatus">
        <i class="bi bi-check-circle-fill me-1"></i>
        تم حفظ مواقع التسميات بنجاح!
    </div>

    <div class="ui-layer pulse-indicator">
        <span class="pulse-label">نبض</span>
        <div class="pulse-bar">
            <div class="pulse-fill" id="pulseFill"></div>
        </div>
    </div>

    <div class="ui-layer controls-panel">
        <div class="action-buttons">
            <button class="btn-action" id="btnAutoRotate" onclick="toggleAutoRotate()">
                <i class="bi bi-arrow-clockwise"></i>
                دوران
            </button>
            <button class="btn-action active" id="btnLabels" onclick="toggleLabels()">
                <i class="bi bi-tags"></i>
                التسميات
            </button>
            <button class="btn-action" id="btnPulse" onclick="togglePulse()">
                <i class="bi bi-heart-pulse"></i>
                نبض
            </button>
            <button class="btn-action" id="btnWireframe" onclick="toggleWireframe()">
                <i class="bi bi-grid-3x3"></i>
                سلكي
            </button>
            <button class="btn-action" id="btnExplode" onclick="toggleExplode()">
                <i class="bi bi-box-seam"></i>
                تفكيك
            </button>
            <button class="btn-action" id="btnResetLabels" onclick="resetLabels()">
                <i class="bi bi-arrow-counterclockwise"></i>
                إعادة التسميات
            </button>
            <button class="btn-action btn-save" id="btnSave" onclick="saveLabels()">
                <i class="bi bi-save"></i>
                حفظ المواقع
            </button>
            <button class="btn-action" id="btnReset" onclick="resetView()">
                <i class="bi bi-arrow-counterclockwise"></i>
                إعادة الكل
            </button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // ═══════════════════════════════════════════════════════════════
        // SCENE SETUP
        // ═══════════════════════════════════════════════════════════════
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x33B1D9);
        scene.fog = new THREE.FogExp2(0x33B1D9, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // ═══════════════════════════════════════════════════════════════
        // CONTROLS
        // ═══════════════════════════════════════════════════════════════
        const controls = new OrbitControls(camera, canvas);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 2;
        controls.maxDistance = 50;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.0;
        controls.enablePan = true;
        controls.update();

        // ═══════════════════════════════════════════════════════════════
        // LIGHTING
        // ═══════════════════════════════════════════════════════════════
        scene.add(new THREE.AmbientLight(0xffcccc, 0.2));

        const keyLight = new THREE.DirectionalLight(0xfff0e0, 2.0);
        keyLight.position.set(5, 8, 5);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(2048, 2048);
        keyLight.shadow.bias = -0.001;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xccccff, 0.8);
        fillLight.position.set(-5, 3, 3);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff6b6b, 1.5);
        rimLight.position.set(0, 5, -8);
        scene.add(rimLight);

        const heartLight = new THREE.PointLight(0xff3333, 1.0, 10);
        heartLight.position.set(0, 0, 2);
        scene.add(heartLight);

        // ═══════════════════════════════════════════════════════════════
        // GROUND
        // ═══════════════════════════════════════════════════════════════
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshStandardMaterial({ color: 0x16213e, roughness: 0.3, metalness: 0.5, transparent: true, opacity: 0.0, side: THREE.DoubleSide })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -3;
        plane.receiveShadow = true;
        scene.add(plane);

        const gridHelper = new THREE.GridHelper(20, 20, 0x4a4a6a, 0x2a2a4a);
        gridHelper.position.y = -2.99;
        scene.add(gridHelper);

        // ═══════════════════════════════════════════════════════════════
        // ═══ نظام التسميات التفاعلية - بدون خطوط ═══
        // ═══════════════════════════════════════════════════════════════
        let labelsVisible = true;
        let labelsLocked = false;
        let heartLabels = [];
        let draggedLabel = null;
        let dragOffset = { x: 0, y: 0 };

        // ═══ تعريف الأجزاء مطابق للصورة ═══
        const heartPartsData = [
            { id: 'aorta', name: 'الشريان الأورطي', position: new THREE.Vector3(0.0, 2.2, 0.3), color: 'red' },
            { id: 'pulmonary-trunk', name: 'الشريان الرئوي', position: new THREE.Vector3(0.6, 1.8, 0.4), color: 'blue' },
            { id: 'superior-vena-cava', name: 'الوريد الأجوف العلوي', position: new THREE.Vector3(-0.5, 1.8, 0.2), color: 'darkblue' },
            { id: 'right-atrium', name: 'الأذين الأيمن', position: new THREE.Vector3(0.8, 0.8, 0.3), color: 'blue' },
            { id: 'left-atrium', name: 'الأذين الأيسر', position: new THREE.Vector3(-0.7, 0.8, 0.2), color: 'red' },
            { id: 'left-coronary', name: 'الشريان التاجي الأيسر', position: new THREE.Vector3(-0.4, 0.4, 0.7), color: 'gold' },
            { id: 'right-coronary', name: 'الشريان التاجي الأيمن', position: new THREE.Vector3(0.4, 0.3, 0.7), color: 'orange' },
            { id: 'right-ventricle', name: 'البطين الأيمن', position: new THREE.Vector3(0.6, -0.4, 0.5), color: 'blue' },
            { id: 'left-ventricle', name: 'البطين الأيسر', position: new THREE.Vector3(-0.5, -0.4, 0.4), color: 'red' },
            { id: 'inferior-vena-cava', name: 'الوريد الأجوف السفلي', position: new THREE.Vector3(0.3, -1.3, 0.2), color: 'purple' },
            { id: 'apex', name: 'قمة القلب', position: new THREE.Vector3(-0.3, -1.6, 0.4), color: 'pink' }
        ];

        const colorMap = {
            red: '#e74c3c', blue: '#3498db', darkblue: '#2980b9', gold: '#f1c40f',
            orange: '#e67e22', purple: '#9b59b6', pink: '#e91e63'
        };

        function getColorHex(colorName) { return colorMap[colorName] || '#ff6b6b'; }

        // ═══════════════════════════════════════════════════════════════
        // ═══ إنشاء التسميات القابلة للسحب ═══
        // ═══════════════════════════════════════════════════════════════
        function createLabels() {
            const container = document.getElementById('labelsContainer');
            container.innerHTML = '';
            heartLabels = [];

            heartPartsData.forEach((part, index) => {
                const labelEl = document.createElement('div');
                labelEl.className = `heart-label label-color-${part.color}`;
                labelEl.id = `label-${part.id}`;
                labelEl.dataset.id = part.id;
                labelEl.innerHTML = `
                    <div class="label-card">
                        <div class="label-number">${index + 1}</div>
                        <div class="label-title">${part.name}</div>
                    </div>
                `;

                // أحداث السحب
                labelEl.addEventListener('mousedown', onLabelMouseDown);
                labelEl.addEventListener('touchstart', onLabelTouchStart, { passive: false });

                container.appendChild(labelEl);

                heartLabels.push({
                    ...part,
                    element: labelEl,
                    worldPosition: part.position.clone(),
                    isSaved: false
                });
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // ═══ معالجات السحب والإفلات - تثبيت بعد السحب ═══
        // ═══════════════════════════════════════════════════════════════
        function onLabelMouseDown(e) {
            if (labelsLocked) return;
            e.preventDefault();
            e.stopPropagation();
            startDrag(e.target.closest('.heart-label'), e.clientX, e.clientY);
            document.addEventListener('mousemove', onLabelMouseMove);
            document.addEventListener('mouseup', onLabelMouseUp);
        }

        function onLabelTouchStart(e) {
            if (labelsLocked) return;
            e.preventDefault();
            const touch = e.touches[0];
            startDrag(e.target.closest('.heart-label'), touch.clientX, touch.clientY);
            document.addEventListener('touchmove', onLabelTouchMove, { passive: false });
            document.addEventListener('touchend', onLabelTouchEnd);
        }

        function startDrag(el, clientX, clientY) {
            draggedLabel = heartLabels.find(l => l.id === el.dataset.id);
            if (!draggedLabel) return;
            draggedLabel.element.classList.add('dragging');
            const rect = el.getBoundingClientRect();
            dragOffset.x = clientX - rect.left;
            dragOffset.y = clientY - rect.top;
            controls.enabled = false;
        }

        function onLabelMouseMove(e) {
            if (!draggedLabel) return;
            e.preventDefault();
            moveLabel(e.clientX, e.clientY);
        }

        function onLabelTouchMove(e) {
            if (!draggedLabel) return;
            e.preventDefault();
            const touch = e.touches[0];
            moveLabel(touch.clientX, touch.clientY);
        }

        function moveLabel(clientX, clientY) {
            if (!draggedLabel) return;
            let x = clientX - dragOffset.x;
            let y = clientY - dragOffset.y;
            const el = draggedLabel.element;
            const w = el.offsetWidth;
            const h = el.offsetHeight;
            x = Math.max(0, Math.min(window.innerWidth - w, x));
            y = Math.max(0, Math.min(window.innerHeight - h, y));
            el.style.left = x + 'px';
            el.style.top = y + 'px';
        }

        function onLabelMouseUp(e) {
            endDrag();
            document.removeEventListener('mousemove', onLabelMouseMove);
            document.removeEventListener('mouseup', onLabelMouseUp);
        }

        function onLabelTouchEnd(e) {
            endDrag();
            document.removeEventListener('touchmove', onLabelTouchMove);
            document.removeEventListener('touchend', onLabelTouchEnd);
        }

        function endDrag() {
            if (draggedLabel) {
                draggedLabel.element.classList.remove('dragging');
                // التسمية تبقى في مكانها - لا ترجع تلقائياً
                draggedLabel = null;
            }
            controls.enabled = true;
        }

        // ═══════════════════════════════════════════════════════════════
        // ═══ تحديث مواقع التسميات - فقط المرئية من الكاميرا ═══
        // ═══════════════════════════════════════════════════════════════
        function updateLabels() {
            if (!labelsVisible || !heartModel) return;

            const tempV = new THREE.Vector3();
            const cameraDirection = new THREE.Vector3();
            camera.getWorldDirection(cameraDirection);

            heartLabels.forEach((label) => {
                tempV.copy(label.worldPosition);
                tempV.applyMatrix4(heartModel.matrixWorld);
                tempV.project(camera);

                const toPart = tempV.clone().sub(camera.position).normalize();
                const dotProduct = cameraDirection.dot(toPart);
                const isFacingCamera = dotProduct > 0.1;

                if (!isFacingCamera || tempV.z > 1) {
                    label.element.classList.remove('visible');
                    return;
                }

                label.element.classList.add('visible');

                // إذا لم تُسحب وغير مُثبَّتة ولا يوجد موقع محفوظ، ضعها تلقائياً
                if (!label.isSaved && !label.element.style.left) {
                    const partX = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                    const partY = (-tempV.y * 0.5 + 0.5) * window.innerHeight;
                    const baseRadius = Math.min(window.innerWidth, window.innerHeight) * 0.25;
                    const offsetX = (Math.random() - 0.5) * baseRadius * 2;
                    const offsetY = -baseRadius * 0.5 + (Math.random() - 0.5) * 50;
                    let labelX = partX + offsetX;
                    let labelY = partY + offsetY;
                    labelX = Math.max(80, Math.min(window.innerWidth - 200, labelX));
                    labelY = Math.max(70, Math.min(window.innerHeight - 120, labelY));
                    label.element.style.left = labelX + 'px';
                    label.element.style.top = labelY + 'px';
                }
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // ═══ حفظ / إعادة التسميات ═══
        // ═══════════════════════════════════════════════════════════════
        window.saveLabels = function() {
            labelsLocked = true;
            heartLabels.forEach(label => {
                label.isSaved = true;
                label.element.classList.add('locked');
            });
            document.getElementById('btnSave').disabled = true;
            document.getElementById('btnSave').innerHTML = '<i class="bi bi-check-circle-fill"></i> تم الحفظ';
            const status = document.getElementById('saveStatus');
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 2500);
        };

        window.resetLabels = function() {
            labelsLocked = false;
            heartLabels.forEach(label => {
                label.isSaved = false;
                label.element.classList.remove('locked');
                label.element.style.left = '';
                label.element.style.top = '';
            });
            document.getElementById('btnSave').disabled = false;
            document.getElementById('btnSave').innerHTML = '<i class="bi bi-save"></i> حفظ المواقع';
        };

        window.toggleLabels = function() {
            labelsVisible = !labelsVisible;
            document.getElementById('btnLabels').classList.toggle('active');
            heartLabels.forEach(label => {
                label.element.style.display = labelsVisible ? 'block' : 'none';
            });
        };

        // ═══════════════════════════════════════════════════════════════
        // ═══ تحميل مجسم GLB ═══
        // ═══════════════════════════════════════════════════════════════
        let heartModel = null;
        let originalPositions = new Map();
        let explodeMode = false;

        const loader = new GLTFLoader();
        const loadingProgress = document.getElementById('loadingProgress');

        function loadModel(url) {
            return new Promise((resolve, reject) => {
                loader.load(url, resolve,
                    (xhr) => {
                        if (xhr.total > 0) {
                            loadingProgress.textContent = Math.round((xhr.loaded / xhr.total) * 100) + '%';
                        }
                    }, reject);
            });
        }

        async function initModel() {
            try {
                const gltf = await loadModel('./models/heart_3d_3.glb');
                heartModel = gltf.scene;
                setupModel(heartModel);
                createLabels();
                hideLoading();
            } catch (error) {
                console.error('خطأ في تحميل النموذج:', error);
                showError('تعذر تحميل نموذج القلب. تأكد من وجود الملف في: models/heart_3d_3.glb');
            }
        }

        function setupModel(model) {
            if (heartModel && heartModel !== model) {
                scene.remove(heartModel);
            }

            originalPositions.clear();
            explodeMode = false;
            document.getElementById('btnExplode').classList.remove('active');

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    saveOriginalPosition(child);
                }
            });

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            const desiredSize = 2.2;
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = desiredSize / maxDim;
            model.scale.setScalar(scale);

            scene.add(model);
            heartModel = model;
        }

        function saveOriginalPosition(mesh) {
            originalPositions.set(mesh.uuid, {
                position: mesh.position.clone(),
                rotation: mesh.rotation.clone()
            });
        }

        function hideLoading() {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 500);
        }

        function showError(msg) {
            loadingProgress.textContent = 'فشل التحميل!';
            loadingProgress.style.color = '#ff4444';
            document.querySelector('.loading-text').textContent = msg;
        }

        // ═══════════════════════════════════════════════════════════════
        // ═══ جسيمات ═══
        // ═══════════════════════════════════════════════════════════════
        const particleCount = 200;
        const pPositions = new Float32Array(particleCount * 3);
        const pColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            pPositions[i*3] = (Math.random()-0.5)*20;
            pPositions[i*3+1] = (Math.random()-0.5)*20;
            pPositions[i*3+2] = (Math.random()-0.5)*20;
            const isRed = Math.random() > 0.3;
            pColors[i*3] = isRed ? 0.8+Math.random()*0.2 : 0.2;
            pColors[i*3+1] = isRed ? 0.1 : 0.2;
            pColors[i*3+2] = isRed ? 0.1 : 0.6+Math.random()*0.4;
        }
        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({
            size: 0.04, vertexColors: true, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending
        }));
        scene.add(particles);

        // ═══════════════════════════════════════════════════════════════
        // ═══ أزرار التحكم ═══
        // ═══════════════════════════════════════════════════════════════
        let autoRotate = false;
        let pulseEnabled = true;
        let wireframeMode = false;

        window.toggleAutoRotate = function() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 2.0;
            document.getElementById('btnAutoRotate').classList.toggle('active');
        };

        window.togglePulse = function() {
            pulseEnabled = !pulseEnabled;
            document.getElementById('btnPulse').classList.toggle('active');
        };

        window.toggleWireframe = function() {
            wireframeMode = !wireframeMode;
            document.getElementById('btnWireframe').classList.toggle('active');
            if (!heartModel) return;
            heartModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.wireframe = wireframeMode);
                    } else {
                        child.material.wireframe = wireframeMode;
                    }
                }
            });
        };

        window.toggleExplode = function() {
            explodeMode = !explodeMode;
            document.getElementById('btnExplode').classList.toggle('active');
            if (!heartModel) return;
            heartModel.traverse((child) => {
                if (child.isMesh && originalPositions.has(child.uuid)) {
                    const original = originalPositions.get(child.uuid);
                    if (explodeMode) {
                        const dir = original.position.clone().normalize();
                        child.position.copy(original.position).add(dir.multiplyScalar(0.8));
                    } else {
                        child.position.copy(original.position);
                    }
                }
            });
        };

        window.resetView = function() {
            camera.position.set(0, 2, 8);
            controls.target.set(0, 0, 0);
            controls.update();

            autoRotate = false;
            controls.autoRotate = false;
            explodeMode = false;
            document.getElementById('btnAutoRotate').classList.remove('active');
            document.getElementById('btnExplode').classList.remove('active');

            if (heartModel) {
                heartModel.traverse((child) => {
                    if (child.isMesh && originalPositions.has(child.uuid)) {
                        child.position.copy(originalPositions.get(child.uuid).position);
                    }
                });
            }
            resetLabels();
        };

        // ═══════════════════════════════════════════════════════════════
        // ═══ حلقة الرسوم المتحركة ═══
        // ═══════════════════════════════════════════════════════════════
        let pulseTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            controls.update();

            if (pulseEnabled && heartModel && !explodeMode) {
                pulseTime += 0.04;
                const pulse = 1 + Math.sin(pulseTime) * 0.03;
                heartModel.scale.set(pulse, pulse, pulse);
                document.getElementById('pulseFill').style.height = (30 + Math.sin(pulseTime) * 30 + 20) + '%';
                heartLight.intensity = 1.0 + Math.sin(pulseTime) * 0.4;
            }

            updateLabels();

            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i*3+1] += Math.sin(time*0.5 + i) * 0.001;
                positions[i*3] += Math.cos(time*0.3 + i) * 0.0005;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ═══════════════════════════════════════════════════════════════
        // ═══ بدء التشغيل ═══
        // ═══════════════════════════════════════════════════════════════
        initModel();
        animate();
    </script>
</body>
</html>
